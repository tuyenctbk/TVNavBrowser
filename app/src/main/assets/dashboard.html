<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaviTV Browser Start Page</title>
    <style>
        :root {
            --bg-color: #0b1020;
            --card-bg: #1c2640;
            --accent-color: #ffc857;
            --text-color: #ffffff;
            --text-secondary: #b3ffffff;
        }

        body {
            margin: 0;
            padding: 40px;
            background: radial-gradient(circle at center, #1e293b 0%, #0b1020 100%);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .header h2 {
            font-size: 28px;
            margin: 0;
            font-weight: 500;
        }

        .dashboard-icons {
            display: flex;
            gap: 15px;
            opacity: 0.7;
        }

        /* Search Bar Area */
        .search-area {
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        .search-input {
            width: 100%;
            height: 56px;
            background-color: rgba(28, 38, 64, 0.6);
            border: 2px solid rgba(255, 200, 87, 0.3);
            border-radius: 12px;
            padding: 0 50px 0 20px;
            color: var(--text-color);
            font-size: 18px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-input:focus {
            border-color: var(--accent-color);
            background-color: rgba(28, 38, 64, 0.9);
            box-shadow: 0 0 20px rgba(255, 200, 87, 0.3);
            transform: scale(1.02);
        }

        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-color);
            font-size: 20px;
        }

        /* Grid Layout */
        .section-title {
            font-size: 18px;
            color: var(--text-secondary);
            margin: 30px 0 15px 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
        }

        /* Shortcut Cards */
        .card {
            position: relative;
            height: 110px;
            border-radius: 12px;
            overflow: hidden;
            background-color: var(--card-bg);
            border: 2px solid transparent;
            transition: all 0.25s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            outline: none;
        }

        .card:focus {
            transform: scale(1.08);
            border-color: var(--accent-color);
            box-shadow: 0 0 30px rgba(255, 200, 87, 0.4);
            z-index: 10;
        }

        .card img {
            max-width: 60%;
            max-height: 50%;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .card-label {
            position: absolute;
            bottom: -30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            transition: all 0.25s;
        }

        .card:focus .card-label {
            bottom: 10px;
            color: var(--text-color);
            font-weight: 600;
        }

        /* Specific card colors as per screenshot */
        .card-youtube { background: linear-gradient(135deg, #FF0000 0%, #282828 100%); }
        .card-netflix { background: linear-gradient(135deg, #E50914 0%, #000000 100%); }
        .card-twitch { background: linear-gradient(135deg, #9146FF 0%, #6441A5 100%); }
        .card-hulu { background: linear-gradient(135deg, #1CE783 0%, #000000 100%); }
        .card-prime { background: linear-gradient(135deg, #00A8E1 0%, #1A98FF 100%); }
        .card-hbo { background: linear-gradient(135deg, #9917FF 0%, #000000 100%); }

        /* Tip Banner */
        .tip-banner {
            margin-top: auto;
            background-color: rgba(28, 38, 64, 0.8);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tip-icon {
            background-color: var(--accent-color);
            color: var(--bg-color);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .tip-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .tip-text b { color: var(--text-color); }
    </style>
</head>
<body>

    <div class="header">
        <h2>NaviTV Browser</h2>
        <div class="dashboard-icons">
            <span>🔲</span>
            <span>👤</span>
        </div>
    </div>

    <div class="search-area">
        <div class="search-box">
            <form action="https://www.google.com/search" method="get">
                <input class="search-input" type="text" name="q" placeholder="www.google.com" autocomplete="off" />
                <span class="search-icon">🔍</span>
            </form>
        </div>
    </div>

    <div class="section-title">Dashboard</div>
    <div class="grid" id="shortcuts-grid">
        <a href="https://www.youtube.com" class="card card-youtube">
            <img src="https://www.youtube.com/favicon.ico" style="filter: brightness(0) invert(1); scale: 2;">
            <div class="card-label">YouTube</div>
        </a>
        <a href="https://www.netflix.com" class="card card-netflix">
            <img src="https://www.netflix.com/favicon.ico" style="filter: brightness(0) invert(1); scale: 2;">
            <div class="card-label">Netflix</div>
        </a>
        <a href="https://www.twitch.tv" class="card card-twitch">
            <img src="https://www.twitch.tv/favicon.ico" style="filter: brightness(0) invert(1); scale: 2;">
            <div class="card-label">Twitch</div>
        </a>
        <a href="https://www.hulu.com" class="card card-hulu">
            <div style="font-size: 40px; font-weight: bold;">hulu</div>
            <div class="card-label">Hulu</div>
        </a>
        <a href="https://www.amazon.com/Prime-Video" class="card card-prime">
            <div style="font-size: 24px; font-weight: bold;">prime video</div>
            <div class="card-label">Prime Video</div>
        </a>
        <a href="https://www.max.com" class="card card-hbo">
            <div style="font-size: 32px; font-weight: bold;">HBOMAX</div>
            <div class="card-label">HBO Max</div>
        </a>
    </div>

    <div class="section-title">Recent</div>
    <div class="grid" id="recent-grid">
        <!-- Will be populated if needed -->
    </div>

    <div class="tip-banner">
        <div class="tip-icon">✜</div>
        <div class="tip-text">
            <b>Tip:</b> Use the D-Pad to navigate and the 'OK' button to select. Press 'Back' to return to the toolbar.<br>
            NaviTV Browser v1.2
        </div>
    </div>

</body>
</html>
