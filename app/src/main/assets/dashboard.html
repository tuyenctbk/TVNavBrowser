<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lite Browser Start Page</title>
    <style>
        :root {
            --bg-color: #0b1020;
            --card-bg: #1c2640;
            --accent-color: #ffc857;
            --text-color: #ffffff;
            --text-secondary: #b3ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1e293b 0%, #0b1020 100%);
            color: var(--text-color);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        h1 span {
            color: var(--accent-color);
        }

        /* Search Section */
        .search-container {
            margin-bottom: 40px;
            width: 100%;
        }

        .search-form {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .search-input {
            width: 80%;
            max-width: 500px;
            height: 48px;
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 0 24px;
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: all 0.25s ease-in-out;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(255, 200, 87, 0.4), 0 4px 10px rgba(0, 0, 0, 0.3);
            transform: scale(1.02);
        }

        /* Speed Dial Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Navigation Cards */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px 10px;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            outline: none;
            cursor: pointer;
        }

        .card:focus, .card:hover {
            transform: scale(1.08);
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(255, 200, 87, 0.5);
            background-color: rgba(255, 200, 87, 0.08);
        }

        .card-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .card:focus .card-title, .card:hover .card-title {
            color: var(--text-color);
        }

        .hint {
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Lite <span>Browser</span></h1>

        <!-- D-pad focusable Google Search -->
        <div class="search-container">
            <form class="search-form" action="https://www.google.com/search" method="get" onsubmit="return this.q.value.trim() !== '';">
                <input class="search-input" type="text" name="q" placeholder="Search Google or enter address..." autocomplete="off" />
            </form>
        </div>

        <!-- TV Speed Dial Shortcuts -->
        <div class="grid">
            <a class="card" href="https://www.youtube.com">
                <div class="card-icon">📺</div>
                <div class="card-title">YouTube</div>
            </a>
            <a class="card" href="https://www.twitch.tv">
                <div class="card-icon">🎮</div>
                <div class="card-title">Twitch</div>
            </a>
            <a class="card" href="https://www.wikipedia.org">
                <div class="card-icon">📚</div>
                <div class="card-title">Wikipedia</div>
            </a>
            <a class="card" href="https://www.imdb.com">
                <div class="card-icon">🎬</div>
                <div class="card-title">IMDb</div>
            </a>
            <a class="card" href="https://news.google.com">
                <div class="card-icon">📰</div>
                <div class="card-title">Google News</div>
            </a>
            <a class="card" href="https://www.weather.com">
                <div class="card-icon">☀️</div>
                <div class="card-title">Weather</div>
            </a>
            <a class="card" href="https://www.reddit.com">
                <div class="card-icon">💬</div>
                <div class="card-title">Reddit</div>
            </a>
            <a class="card" href="https://www.github.com">
                <div class="card-icon">💻</div>
                <div class="card-title">GitHub</div>
            </a>
        </div>

        <div class="hint">
            Press Up to focus the address bar · D-pad to navigate speed dial · OK to open
        </div>
    </div>

</body>
</html>
